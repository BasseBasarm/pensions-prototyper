<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pension i 60 sekunder | P+ Pensionskassen</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // ── Farver (P+ brand-inspireret) ──────────────────────────────────
    const PP_DARK = "#1A1A2E";
    const PP_BLUE = "#0F3460";
    const PP_ACCENT = "#E94560";
    const PP_WARM = "#F5E6CC";
    const PP_LIGHT = "#F8F9FA";
    const PP_GREEN = "#16A085";

    // ── Emnedata ──────────────────────────────────────────────────────
    const EMNER = [
      {
        id: "livrente",
        title: "Livsvarig pension",
        subtitle: "Din grundstamme",
        icon: "♾️",
        color: "#0F3460",
        tid: "60 sek",
        steps: [
          {
            type: "intro",
            heading: "Hvad er livsvarig pension?",
            body: "Tænk på den som din økonomiske bundlinje i pensionisttilværelsen. Den udbetaler et fast beløb hver måned — resten af dit liv. Uanset om du bliver 72 eller 102.",
            visual: "infinity",
          },
          {
            type: "how",
            heading: "Hvordan virker det?",
            body: "Hver måned går størstedelen af din pensionsindbetaling til din livsvarige alderspension. P+ investerer pengene og sikrer, at du får udbetalt fra den dag du går på pension — og indtil du ikke er her mere.",
            visual: "flow",
          },
          {
            type: "why",
            heading: "Hvorfor er det vigtigt?",
            body: "Fordi ingen ved hvor længe de lever. Med en ratepension kan pengene løbe ud. Din livsvarige pension gør aldrig. Den er dit sikkerhedsnet — den betaling du altid kan regne med.",
            visual: "shield",
          },
          {
            type: "action",
            heading: "Hvad skal du gøre?",
            body: "Ingenting, faktisk. Som medlem af P+ går dine indbetalinger automatisk til livsvarig pension. Men det kan være værd at tjekke: Passer fordelingen mellem livrente og ratepension til dit liv?",
            cta: "Tjek din fordeling på pplus.dk →",
          },
        ],
      },
      {
        id: "ratepension",
        title: "Ratepension",
        subtitle: "Ekstra i starten",
        icon: "📊",
        color: "#16A085",
        tid: "60 sek",
        steps: [
          {
            type: "intro",
            heading: "Hvad er ratepension?",
            body: "Ratepension er en pose penge, der udbetales i rater over fx 10-30 år efter du går på pension. Tænk på det som et boost oven på din livsvarige pension — ekstra penge de første år.",
            visual: "bars",
          },
          {
            type: "how",
            heading: "Hvorfor ikke bare livrente?",
            body: "Fordi de første år som pensionist ofte er de dyreste. Du vil rejse, renovere, leve livet. Ratepensionen giver dig råd til det — og så tager den livsvarige pension over bagefter.",
            visual: "wave",
          },
          {
            type: "numbers",
            heading: "Et hurtigt regnestykke",
            body: "Standardudbetalingen er over 10 år. Men du kan vælge op til 30 år. Kortere periode = højere månedligt beløb. Længere periode = lavere beløb, men tryghed i længere tid.",
            visual: "slider",
          },
          {
            type: "action",
            heading: "Hvad kan du gøre?",
            body: "Overvej om du vil justere hvor meget der går til ratepension vs. livrente. Har du store planer for de første pensionsår? Så kan en større ratepension give mening.",
            cta: "Se dine muligheder på pplus.dk →",
          },
        ],
      },
      {
        id: "aldersopsparing",
        title: "Aldersopsparing",
        subtitle: "Dit frie beløb",
        icon: "🏦",
        color: "#8E44AD",
        tid: "45 sek",
        steps: [
          {
            type: "intro",
            heading: "Hvad er aldersopsparing?",
            body: "En opsparingskonto du selv indbetaler til — og som du frit kan hæve på, når du går på pension. Ingen binding, ingen rater. Bare dine penge, klar til dig.",
            visual: "piggybank",
          },
          {
            type: "how",
            heading: "Hvad er fordelen?",
            body: "Til forskel fra ratepension beskattes afkastet kun med 15,3% (PAL-skat) — mod op til 42% på en almindelig opsparingskonto. Og udbetalingen påvirker ikke din folkepension eller andre ydelser.",
            visual: "tax",
          },
          {
            type: "action",
            heading: "Skal du have én?",
            body: "Du kan ikke indbetale via din arbejdsgiver — kun selv. Loftet er ca. 9.100 kr. om året (2026). Det er ikke et stort beløb, men over 20-30 år vokser det pænt med rentes rente.",
            cta: "Læs mere om aldersopsparing på pplus.dk →",
          },
        ],
      },
      {
        id: "doedsfaldssum",
        title: "Dødsfaldssum",
        subtitle: "Sikkerhed for dine nærmeste",
        icon: "🛡️",
        color: "#E74C3C",
        tid: "45 sek",
        steps: [
          {
            type: "intro",
            heading: "Hvad er en dødsfaldssum?",
            body: "Det er et engangsbeløb der udbetales til dine nærmeste, hvis du dør før du fylder 68. Tænk på det som en livsforsikring — en økonomisk håndsrækning i den sværeste tid.",
            visual: "family",
          },
          {
            type: "how",
            heading: "Hvem får pengene?",
            body: "Som udgangspunkt din ægtefælle, samlever eller børn. Men du kan selv vælge begunstigede. Har du styr på hvem der er indsat? Det er en af de ting, de færreste har tjekket.",
            visual: "people",
          },
          {
            type: "action",
            heading: "Hvad skal du gøre?",
            body: "Alle bidragende medlemmer af P+ har automatisk en dødsfaldssum. Men tjek: Er den rigtige person indsat som begunstiget? Er beløbet passende? Det tager 2 minutter at opdatere.",
            cta: "Opdater dine begunstigede på pplus.dk →",
          },
        ],
      },
      {
        id: "samleverforsikring",
        title: "Udbetalingssikring",
        subtitle: "Hvis du dør efter pensionen",
        icon: "💕",
        color: "#2980B9",
        tid: "50 sek",
        steps: [
          {
            type: "intro",
            heading: "Hvad er udbetalingssikring?",
            body: "Din livsvarige pension stopper den dag du dør. Men hvad med din partner? Med udbetalingssikring fortsætter udbetalingen til din ægtefælle eller samlever — typisk i 10 år efter din død.",
            visual: "heart",
          },
          {
            type: "how",
            heading: "Hvad koster det?",
            body: "Det er ikke gratis. Du betaler med en lidt lavere pension mens du lever. Men for mange er trygheden det værd — særligt hvis din partner ikke har sin egen store pension.",
            visual: "balance",
          },
          {
            type: "action",
            heading: "Er det noget for dig?",
            body: "Spørg dig selv: Kan min partner klare sig økonomisk uden min pension? Hvis svaret er usikkert, er udbetalingssikring værd at kigge på. Du kan til- og fravælge det.",
            cta: "Læs om udbetalingssikring på pplus.dk →",
          },
        ],
      },
      {
        id: "investering",
        title: "P+ Livscyklus",
        subtitle: "Sådan investeres dine penge",
        icon: "📈",
        color: "#F39C12",
        tid: "60 sek",
        steps: [
          {
            type: "intro",
            heading: "Hvem investerer dine penge?",
            body: "P+ gør. Og de gør det via \"Livscyklus\" — en model der automatisk tilpasser risikoen til din alder. Ung? Mere risiko, mere potentiale. Tættere på pension? Mere sikkerhed.",
            visual: "lifecycle",
          },
          {
            type: "how",
            heading: "Hvordan virker det?",
            body: "I dine unge år investeres mere i aktier og alternative investeringer. Når du nærmer dig pension, skiftes gradvist til mere sikre obligationer. Du behøver ikke gøre noget — det sker automatisk.",
            visual: "gradient",
          },
          {
            type: "numbers",
            heading: "Virker det?",
            body: "I 2025 gav P+ Livscyklus med medium risiko og 15 år til pension et afkast på 12,0%. Det er flotte tal. Men husk: Afkast svinger fra år til år. Det vigtige er den langsigtede tendens.",
            visual: "chart",
          },
          {
            type: "action",
            heading: "Kan du selv bestemme?",
            body: "Ja. Du kan vælge mellem lav, medium og høj risiko. De fleste akademikere har medium — men hvis du har lang tid til pension og kan tåle udsving, kan høj risiko give mere i det lange løb.",
            cta: "Se din risikoprofil på pplus.dk →",
          },
        ],
      },
    ];

    // ── Visuelle elementer ────────────────────────────────────────────
    function StepVisual({ type, color }) {
      const s = {
        display: "flex",
        alignItems: "center",
        justifyContent: "center",
        height: 120,
        marginBottom: 20,
        borderRadius: 16,
        background: `${color}11`,
      };

      if (type === "infinity") {
        return (
          <div style={s}>
            <div style={{ fontSize: 64, color, opacity: 0.8 }}>♾️</div>
          </div>
        );
      }
      if (type === "flow") {
        return (
          <div style={s}>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              {["Indbetaling", "Investering", "Udbetaling"].map((label, i) => (
                <div key={i} style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <div
                    style={{
                      background: color,
                      color: "#FFF",
                      padding: "8px 14px",
                      borderRadius: 8,
                      fontSize: 12,
                      fontWeight: 600,
                    }}
                  >
                    {label}
                  </div>
                  {i < 2 && <span style={{ color, fontSize: 20 }}>→</span>}
                </div>
              ))}
            </div>
          </div>
        );
      }
      if (type === "shield") {
        return (
          <div style={s}>
            <div style={{ textAlign: "center" }}>
              <div style={{ fontSize: 48 }}>🛡️</div>
              <div style={{ fontSize: 12, color: "#6B7280", marginTop: 4 }}>Livsvarig sikkerhed</div>
            </div>
          </div>
        );
      }
      if (type === "bars") {
        return (
          <div style={{ ...s, gap: 6, paddingBottom: 20 }}>
            {[85, 85, 85, 85, 85, 60, 45, 30, 20, 10].map((h, i) => (
              <div key={i} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 4 }}>
                <div
                  style={{
                    width: 24,
                    height: h,
                    background: i < 5 ? color : `${color}44`,
                    borderRadius: 4,
                    transition: "height 0.3s",
                  }}
                />
                <span style={{ fontSize: 9, color: "#9CA3AF" }}>{i + 1}</span>
              </div>
            ))}
          </div>
        );
      }
      if (type === "wave") {
        return (
          <div style={s}>
            <div style={{ textAlign: "center" }}>
              <div style={{ fontSize: 14, color: "#6B7280", marginBottom: 8 }}>De første år</div>
              <div style={{ display: "flex", gap: 4, alignItems: "end" }}>
                <div style={{ background: color, width: 40, height: 60, borderRadius: "6px 6px 0 0" }} />
                <div style={{ background: color, width: 40, height: 60, borderRadius: "6px 6px 0 0", opacity: 0.7 }} />
                <div style={{ background: "#DDD", width: 2, height: 60 }} />
                <div style={{ background: PP_BLUE, width: 40, height: 35, borderRadius: "6px 6px 0 0", opacity: 0.5 }} />
                <div style={{ background: PP_BLUE, width: 40, height: 35, borderRadius: "6px 6px 0 0", opacity: 0.5 }} />
                <div style={{ background: PP_BLUE, width: 40, height: 35, borderRadius: "6px 6px 0 0", opacity: 0.5 }} />
              </div>
              <div style={{ display: "flex", gap: 4, fontSize: 10, color: "#9CA3AF", marginTop: 4 }}>
                <span style={{ width: 84, textAlign: "center" }}>Rate + livrente</span>
                <span style={{ width: 2 }}></span>
                <span style={{ width: 124, textAlign: "center" }}>Kun livrente</span>
              </div>
            </div>
          </div>
        );
      }
      if (type === "slider") {
        return (
          <div style={s}>
            <div style={{ textAlign: "center", width: "80%" }}>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: "#6B7280", marginBottom: 8 }}>
                <span>10 år</span>
                <span>20 år</span>
                <span>30 år</span>
              </div>
              <div style={{ height: 8, background: "#E5E7EB", borderRadius: 4, position: "relative" }}>
                <div style={{ position: "absolute", left: 0, top: 0, height: 8, width: "33%", background: color, borderRadius: 4 }} />
                <div style={{ position: "absolute", left: "calc(33% - 8px)", top: -4, width: 16, height: 16, background: "#FFF", border: `3px solid ${color}`, borderRadius: "50%" }} />
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, marginTop: 8 }}>
                <span style={{ color }}>Højere udbetaling</span>
                <span style={{ color: "#9CA3AF" }}>Længere tryghed</span>
              </div>
            </div>
          </div>
        );
      }
      // Default: icon-baseret
      const iconMap = {
        piggybank: "🏦",
        tax: "📉",
        family: "👨‍👩‍👧‍👦",
        people: "👥",
        heart: "💕",
        balance: "⚖️",
        lifecycle: "🔄",
        gradient: "📊",
        chart: "📈",
      };
      return (
        <div style={s}>
          <div style={{ fontSize: 56, opacity: 0.8 }}>{iconMap[type] || "📋"}</div>
        </div>
      );
    }

    // ── Emnekort (oversigt) ───────────────────────────────────────────
    function EmneKort({ emne, onClick }) {
      return (
        <button
          onClick={onClick}
          style={{
            display: "flex",
            alignItems: "center",
            gap: 16,
            width: "100%",
            padding: "18px 20px",
            border: "1px solid #E5E7EB",
            borderRadius: 16,
            background: "#FFF",
            cursor: "pointer",
            textAlign: "left",
            transition: "all 0.2s ease",
            fontFamily: "inherit",
            boxShadow: "0 1px 3px rgba(0,0,0,0.04)",
          }}
          onMouseEnter={(e) => {
            e.currentTarget.style.transform = "translateY(-2px)";
            e.currentTarget.style.boxShadow = "0 4px 12px rgba(0,0,0,0.08)";
          }}
          onMouseLeave={(e) => {
            e.currentTarget.style.transform = "translateY(0)";
            e.currentTarget.style.boxShadow = "0 1px 3px rgba(0,0,0,0.04)";
          }}
        >
          <div
            style={{
              width: 52,
              height: 52,
              display: "flex",
              alignItems: "center",
              justifyContent: "center",
              borderRadius: 14,
              background: `${emne.color}11`,
              fontSize: 26,
              flexShrink: 0,
            }}
          >
            {emne.icon}
          </div>
          <div style={{ flex: 1 }}>
            <div style={{ fontWeight: 700, color: PP_DARK, fontSize: 16 }}>{emne.title}</div>
            <div style={{ fontSize: 13, color: "#6B7280", marginTop: 2 }}>{emne.subtitle}</div>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 6, flexShrink: 0 }}>
            <span
              style={{
                fontSize: 11,
                color: emne.color,
                background: `${emne.color}15`,
                padding: "3px 10px",
                borderRadius: 20,
                fontWeight: 600,
              }}
            >
              {emne.tid}
            </span>
            <span style={{ color: "#CBD5E0", fontSize: 18 }}>›</span>
          </div>
        </button>
      );
    }

    // ── Hovedapplikation ──────────────────────────────────────────────
    function PensionI60Sekunder() {
      const [valgtEmne, setValgtEmne] = React.useState(null);
      const [currentStep, setCurrentStep] = React.useState(0);
      const [fadeIn, setFadeIn] = React.useState(true);
      const [timer, setTimer] = React.useState(0);
      const [timerActive, setTimerActive] = React.useState(false);

      const emne = valgtEmne ? EMNER.find((e) => e.id === valgtEmne) : null;
      const totalSteps = emne ? emne.steps.length : 0;

      React.useEffect(() => {
        setFadeIn(false);
        const t = setTimeout(() => setFadeIn(true), 50);
        return () => clearTimeout(t);
      }, [valgtEmne, currentStep]);

      React.useEffect(() => {
        let interval;
        if (timerActive) {
          interval = setInterval(() => setTimer((t) => t + 1), 1000);
        }
        return () => clearInterval(interval);
      }, [timerActive]);

      function openEmne(id) {
        setValgtEmne(id);
        setCurrentStep(0);
        setTimer(0);
        setTimerActive(true);
      }

      function goBack() {
        setValgtEmne(null);
        setCurrentStep(0);
        setTimerActive(false);
        setTimer(0);
      }

      function nextStep() {
        if (currentStep < totalSteps - 1) {
          setCurrentStep((s) => s + 1);
        } else {
          setTimerActive(false);
        }
      }

      function prevStep() {
        if (currentStep > 0) setCurrentStep((s) => s - 1);
      }

      // ── Oversigtsside ──
      if (!valgtEmne) {
        return (
          <div
            style={{
              minHeight: "100vh",
              background: PP_LIGHT,
              fontFamily: "'Georgia', 'Times New Roman', serif",
            }}
          >
            <div
              style={{
                background: `linear-gradient(135deg, ${PP_DARK} 0%, ${PP_BLUE} 100%)`,
                color: "#FFF",
                padding: "48px 20px",
                textAlign: "center",
              }}
            >
              <div style={{ maxWidth: 520, margin: "0 auto" }}>
                <div style={{ fontSize: 13, letterSpacing: 3, textTransform: "uppercase", opacity: 0.6, marginBottom: 16, fontFamily: "system-ui, sans-serif" }}>
                  P+ Pensionskassen for Akademikere
                </div>
                <h1 style={{ fontSize: 36, fontWeight: 400, margin: "0 0 12px", lineHeight: 1.2 }}>
                  Pension i 60 sekunder
                </h1>
                <p style={{ fontSize: 16, opacity: 0.8, lineHeight: 1.6, fontFamily: "system-ui, sans-serif" }}>
                  Forstå din pension — ét emne ad gangen. Ingen jargon, ingen PDF'er på 40 sider.
                  Bare det du har brug for at vide.
                </p>
              </div>
            </div>

            <div style={{ maxWidth: 560, margin: "0 auto", padding: "28px 20px 48px" }}>
              <p style={{ fontSize: 14, color: "#6B7280", marginBottom: 20, fontFamily: "system-ui, sans-serif" }}>
                Vælg et emne — det tager under et minut.
              </p>
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {EMNER.map((e) => (
                  <EmneKort key={e.id} emne={e} onClick={() => openEmne(e.id)} />
                ))}
              </div>
            </div>
          </div>
        );
      }

      // ── Emnevisning ──
      const step = emne.steps[currentStep];
      const isLast = currentStep === totalSteps - 1;

      return (
        <div
          style={{
            minHeight: "100vh",
            background: PP_LIGHT,
            fontFamily: "'Georgia', 'Times New Roman', serif",
          }}
        >
          {/* Header */}
          <div
            style={{
              background: "#FFF",
              borderBottom: "1px solid #E5E7EB",
              padding: "12px 20px",
              display: "flex",
              alignItems: "center",
              justifyContent: "space-between",
              position: "sticky",
              top: 0,
              zIndex: 10,
              fontFamily: "system-ui, sans-serif",
            }}
          >
            <button
              onClick={goBack}
              style={{
                background: "none",
                border: "none",
                color: emne.color,
                fontSize: 14,
                cursor: "pointer",
                fontWeight: 600,
                fontFamily: "inherit",
                display: "flex",
                alignItems: "center",
                gap: 6,
              }}
            >
              ← Alle emner
            </button>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <span style={{ fontSize: 13, color: "#9CA3AF", fontFamily: "monospace" }}>
                {timer}s
              </span>
              <span style={{ fontSize: 13, color: "#6B7280" }}>
                {currentStep + 1} / {totalSteps}
              </span>
            </div>
          </div>

          {/* Progress */}
          <div style={{ display: "flex", gap: 4, padding: "0 20px", marginTop: 12 }}>
            {emne.steps.map((_, i) => (
              <div
                key={i}
                style={{
                  flex: 1,
                  height: 4,
                  borderRadius: 2,
                  background: i <= currentStep ? emne.color : "#E5E7EB",
                  transition: "background 0.3s",
                }}
              />
            ))}
          </div>

          {/* Indhold */}
          <div
            style={{
              maxWidth: 520,
              margin: "0 auto",
              padding: "28px 20px 100px",
              opacity: fadeIn ? 1 : 0,
              transform: fadeIn ? "translateY(0)" : "translateY(10px)",
              transition: "all 0.3s ease",
            }}
          >
            {/* Emnetitel */}
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 24 }}>
              <span style={{ fontSize: 28 }}>{emne.icon}</span>
              <div>
                <div style={{ fontSize: 12, color: emne.color, fontWeight: 600, fontFamily: "system-ui, sans-serif", textTransform: "uppercase", letterSpacing: 1 }}>
                  {emne.title}
                </div>
              </div>
            </div>

            {/* Visual */}
            <StepVisual type={step.visual} color={emne.color} />

            {/* Tekst */}
            <h2 style={{ fontSize: 26, color: PP_DARK, margin: "0 0 14px", fontWeight: 400, lineHeight: 1.3 }}>
              {step.heading}
            </h2>
            <p
              style={{
                fontSize: 16,
                color: "#4B5563",
                lineHeight: 1.8,
                fontFamily: "system-ui, sans-serif",
                margin: "0 0 24px",
              }}
            >
              {step.body}
            </p>

            {/* CTA (kun på action-steps) */}
            {step.cta && (
              <div
                style={{
                  background: `${emne.color}10`,
                  border: `1px solid ${emne.color}30`,
                  borderRadius: 12,
                  padding: "14px 18px",
                  color: emne.color,
                  fontWeight: 600,
                  fontSize: 14,
                  fontFamily: "system-ui, sans-serif",
                }}
              >
                {step.cta}
              </div>
            )}
          </div>

          {/* Navigation */}
          <div
            style={{
              position: "fixed",
              bottom: 0,
              left: 0,
              right: 0,
              background: "#FFF",
              borderTop: "1px solid #E5E7EB",
              padding: "14px 20px",
              display: "flex",
              justifyContent: "space-between",
              alignItems: "center",
              fontFamily: "system-ui, sans-serif",
            }}
          >
            <button
              onClick={prevStep}
              disabled={currentStep === 0}
              style={{
                padding: "10px 20px",
                border: "1px solid #E5E7EB",
                borderRadius: 10,
                background: "#FFF",
                color: currentStep === 0 ? "#D1D5DB" : "#374151",
                fontSize: 14,
                cursor: currentStep === 0 ? "default" : "pointer",
                fontFamily: "inherit",
              }}
            >
              ← Tilbage
            </button>

            {isLast && !timerActive ? (
              <button
                onClick={goBack}
                style={{
                  padding: "10px 24px",
                  border: "none",
                  borderRadius: 10,
                  background: emne.color,
                  color: "#FFF",
                  fontSize: 14,
                  fontWeight: 600,
                  cursor: "pointer",
                  fontFamily: "inherit",
                }}
              >
                ✓ Færdig — vælg næste emne
              </button>
            ) : (
              <button
                onClick={nextStep}
                style={{
                  padding: "10px 24px",
                  border: "none",
                  borderRadius: 10,
                  background: emne.color,
                  color: "#FFF",
                  fontSize: 14,
                  fontWeight: 600,
                  cursor: "pointer",
                  fontFamily: "inherit",
                }}
              >
                Næste →
              </button>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(PensionI60Sekunder));
  </script>
</body>
</html>
