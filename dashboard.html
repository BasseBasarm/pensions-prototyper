    function analyserSvarForJargon(svarTekst) {
      const tekst = svarTekst.toLowerCase();
      const fundne = [];
      for (const [term, data] of Object.entries(JARGON_ORDBOG)) {
        if (tekst.includes(term.toLowerCase())) {
          fundne.push({ term, ...data });
        }
      }
      // Sortér: høj alvorlighed først
      fundne.sort((a, b) => {
        const order = { "høj": 0, "middel": 1, "lav": 2 };
        return order[a.alvorlighed] - order[b.alvorlighed];
      });
      return fundne;
    }

    // ── Mailanalyse-motor ─────────────────────────────────────────────
    function analyserMail(mailTekst) {
      const tekst = mailTekst.toLowerCase();
      const result = {
        navn: null,
        situationer: [],
        spørgsmål: [],
        tone: "neutral",
        tips: [],
      };

      // ── Find navn ──
      // Tjek signatur-mønstre
      const signaturMønstre = [
        /(?:venlig hilsen|mvh|hilsen|vh|best regards|regards|med venlig hilsen)[,.\s\n\r]+([A-ZÆØÅ][a-zæøåé]+)/i,
        /(?:^|\n)([A-ZÆØÅ][a-zæøåé]+)\s*$/m,
        /(?:^|\n)--\s*\n([A-ZÆØÅ][a-zæøåé]+)/m,
        /(?:^|\n)([A-ZÆØÅ][a-zæøåé]+)\s+[A-ZÆØÅ][a-zæøåé]+\s*\n.*(?:tlf|tel|mob|m:|t:|\+45)/im,
      ];

      for (const mønster of signaturMønstre) {
        const match = mailTekst.match(mønster);
        if (match && match[1]) {
          const potentialName = match[1].trim();
          const excludeWords = ["hej", "tak", "kære", "dear", "hello", "hi", "hey", "og", "den", "det", "med", "fra", "til", "jeg", "min", "mit", "mine", "hvis", "kan", "vil", "har", "var", "men", "som", "der", "for", "ved"];
          if (!excludeWords.includes(potentialName.toLowerCase()) && potentialName.length > 1) {
            result.navn = potentialName;
            break;
          }
        }
      }

      // Fallback: "Jeg hedder X" / "Mit navn er X"
      if (!result.navn) {
        const navnMatch = mailTekst.match(/(?:jeg hedder|mit navn er|jeg er)\s+([A-ZÆØÅ][a-zæøåé]+)/i);
        if (navnMatch) result.navn = navnMatch[1];
      }

      // ── Detekter situationer ──
      if (/fyr|fritstil|opsagt|afskedig|mistet.*job|mist.*arbejd|ledig|dagpenge|a-kasse/i.test(tekst)) {
        result.situationer.push("fyret");
      }
      if (/nyt job|ny arbejdsgiver|starter.*hos|begynder.*hos|ansat.*hos|tiltrådt|tiltr/i.test(tekst)) {
        result.situationer.push("nytjob");
      }
      if (/barsel|orlov|gravid|fødsel|forældreorlov|fædreorlov/i.test(tekst)) {
        result.situationer.push("barsel");
      }
      if (/pension(?!s)|gå.*pension|stoppe.*arbejde|fratræd|efterløn|folkepension|pensionist/i.test(tekst)) {
        result.situationer.push("pensionering");
      }
      if (/skilsmisse|separation|skilt|skilles|eks-|eksmand|ekskone|bodeling/i.test(tekst)) {
        result.situationer.push("skilsmisse");
      }
      if (/ekstra.*indbetal|indbetal.*ekstra|aldersopsparing|spare.*op|frivillig.*indbetal|indbetalingskort/i.test(tekst)) {
        result.situationer.push("indbetaling");
      }
      if (/forsikring|dækning|invalide|dødsfaldssum|sundhedsforsikring|udbetalingssikring|depotsikring/i.test(tekst)) {
        result.situationer.push("forsikring");
      }

      // ── Detekter konkrete spørgsmål ──
      if (/hvad koster|hvad er prisen|hvad betaler|hvad skal jeg betale|pris/i.test(tekst)) {
        result.spørgsmål.push("Medlemmet spørger til pris/omkostninger — giv et konkret tal.");
      }
      if (/hvordan|hvorledes|hvad gør jeg|hvad skal jeg/i.test(tekst)) {
        result.spørgsmål.push("Medlemmet beder om en vejledning — forklar trin for trin.");
      }
      if (/kan jeg|er det muligt|mulighed for|må jeg/i.test(tekst)) {
        result.spørgsmål.push("Medlemmet spørger om noget er muligt — svar klart ja/nej med forklaring.");
      }
      if (/hvornår|hvor lang tid|tidshorisont|frist/i.test(tekst)) {
        result.spørgsmål.push("Medlemmet spørger til timing — giv konkrete datoer/perioder.");
      }
      if (/beholde|miste|ryger|forsvinder|mister jeg/i.test(tekst)) {
        result.spørgsmål.push("Medlemmet er bekymret for at miste noget — berolig og forklar konkret.");
      }

      // ── Detekter tone/bekymring ──
      if (/bekymr|bange|nervøs|stress|presset|svært|hårdt|frustr/i.test(tekst)) {
        result.tone = "bekymret";
      }
      if (/akut|haster|hurtig|snarest|straks|omgående/i.test(tekst)) {
        result.tone = "akut";
      }
      if (/tak|fantastisk|dejligt|fedt|super|glæder/i.test(tekst)) {
        result.tone = "positiv";
      }

      // ── Generer tips ──
      if (result.situationer.includes("fyret")) {
        result.tips.push("Nævn prisen på forsikringer proaktivt (495 kr./md. + 60% afgift) — det er næsten altid det, de vil vide.");
      }
      if (result.tone === "akut") {
        result.tips.push("Mailen virker presserende — prioriter det vigtigste først og vær konkret.");
      }
      if (result.spørgsmål.length === 0) {
        result.tips.push("Mailen indeholder ikke et direkte spørgsmål — men læs mellem linjerne: Hvad har medlemmet egentlig brug for at vide?");
      }
      if (result.situationer.length === 0) {
        result.tips.push("Situationen er ikke umiddelbart genkendelig — stil opklarende spørgsmål i dit svar.");
      }
      result.tips.push("Tjek at du bruger medlemmets foretrukne navn — ikke nødvendigvis det der står i CRM.");
      result.tips.push("Hold svaret kort og struktureret. Brug overskrifter. Undgå jargon.");

      // Fallback situation
      if (result.situationer.length === 0) {
        result.situationer.push("forsikring");
      }

      return result;
    }

    // ── Hovedapplikation ──────────────────────────────────────────────
    function RaadgiverDashboardV2() {

        setIsAnalysing(true);
        setCheckedItems({});
        // Simuler kort "tænketid"

          const result = analyserMail(mailTekst);
          setAnalyse(result);
          setIsAnalysing(false);
        }, 800);
      }

      function handleReset() {
        setMailTekst("");
        setAnalyse(null);
        setCheckedItems({});
        setSvarTekst("");
        setJargonFund([]);
      }

      function handleTjekSvar() {
        const fund = analyserSvarForJargon(svarTekst);
        setJargonFund(fund);
      }

      function toggleCheck(key) {
        setCheckedItems((prev) => ({ ...prev, [key]: !prev[key] }));
      }

      const primærSituation = analyse ? VIDENSBASE[analyse.situationer[0]] : null;

      return (

              <span style={{ fontSize: 18 }}>📋</span>
              <span style={{ fontWeight: 700, fontSize: 16 }}>P+ Rådgiver-Dashboard</span>
              <span style={{ fontSize: 10, background: PP_ACCENT, color: "#FFF", padding: "2px 8px", borderRadius: 10, fontWeight: 600, marginLeft: 4 }}>PROTOTYPE</span>
            </div>
            {analyse && (
              <button onClick={handleReset} style={{ background: "rgba(255,255,255,0.12)", border: "none", color: "#FFF", padding: "5px 14px", borderRadius: 20, cursor: "pointer", fontSize: 12, fontFamily: "inherit" }}>
                Ny henvendelse
              </button>
            )}
          </div>

          {/* ── Mailindtastning (før analyse) ── */}
          {!analyse && (
            <div style={{ maxWidth: 700, margin: "0 auto", padding: "32px 20px" }}>
              <div style={{ textAlign: "center", marginBottom: 28 }}>
                <h1 style={{ fontSize: 24, color: PP_DARK, fontWeight: 600, margin: "0 0 8px" }}>
                  Indsæt medlemmets mail
                </h1>
                <p style={{ fontSize: 14, color: "#6B7280", margin: 0, lineHeight: 1.5 }}>
                  Kopier mailen herind. Dashboardet analyserer indholdet og giver dig et empatisk, klart svar klar til at sende.
                </p>
              </div>

              <div style={{ background: "#FFF", borderRadius: 16, border: "1px solid #D1D5DB", overflow: "hidden", boxShadow: "0 2px 8px rgba(0,0,0,0.04)" }}>
                <textarea
                  ref={textareaRef}
                  value={mailTekst}
                  onChange={(e) => setMailTekst(e.target.value)}
                  placeholder={"Indsæt medlemmets mail her...\n\nEksempel:\n\"Hej. Jeg er blevet fritstillet og kan se at mine forsikringer ryger 1. april. Hvad koster det at beholde dem?\n\nBastian\""}
                  style={{
                    width: "100%",
                    minHeight: 240,
                    padding: 20,
                    border: "none",
                    fontSize: 14,
                    lineHeight: 1.7,
                    fontFamily: "inherit",
                    resize: "vertical",
                    boxSizing: "border-box",
                    color: "#1F2937",
                    outline: "none",
                  }}
                />
                <div style={{ padding: "12px 20px", borderTop: "1px solid #F3F4F6", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <span style={{ fontSize: 12, color: "#9CA3AF" }}>
                    {mailTekst.length > 0 ? `${mailTekst.length} tegn` : ""}
                  </span>
                  <button
                    onClick={handleAnalyser}

                      background: mailTekst.trim() ? PP_BLUE : "#D1D5DB",

                      borderRadius: 10,
                      fontSize: 14,
                      fontWeight: 600,
                      cursor: mailTekst.trim() ? "pointer" : "default",
                      fontFamily: "inherit",
                      transition: "background 0.2s",
                    }}
                  >
                    {isAnalysing ? "Analyserer..." : "Analysér mail →"}
                  </button>
                </div>
              </div>

              {/* Eksempel-mails */}
              <div style={{ marginTop: 20 }}>
                <p style={{ fontSize: 12, color: "#9CA3AF", marginBottom: 8 }}>Eller prøv med et eksempel:</p>
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                  {[
                    { label: "Fyret-eksempel", tekst: "Hej. Jeg har fået en mail om at mine forsikringer ryger 1/4. Jeg blev fritstillet tilbage i september. Jeg kunne godt tænke mig at beholde forsikringerne - det gør jeg vel hvis jeg indbetaler minimumssatsen på de der 1400 kr. om måneden, ik?\n\nBastian Kjar\nM: 26 23 79 45" },
                    { label: "Nyt job-eksempel", tekst: "Hej P+\n\nJeg er lige startet i nyt job og vil gerne sikre mig at min pension følger med. Jeg har tidligere indbetalt privat via netbank - skal jeg stoppe det?\n\nMvh\nSofie" },
                    { label: "Aldersopsparing", tekst: "Hejsa. Kan jeg oprette en aldersopsparing til mine to, snart 3, børn hos jer? Nordnet har en ret fleksibel løsning men vil hellere samle det hele hos jer\n\n--\nBastian" },
                  ].map((ex, i) => (
                    <button
                      key={i}
                      onClick={() => setMailTekst(ex.tekst)}
                      style={{ padding: "6px 14px", background: "#FFF", border: "1px solid #E5E7EB", borderRadius: 8, fontSize: 12, color: PP_BLUE, cursor: "pointer", fontFamily: "inherit", fontWeight: 500 }}
                    >
                      {ex.label}
                    </button>
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* ── Analyseresultat ── */}
          {analyse && (
            <div style={{ display: "flex", maxWidth: 1140, margin: "0 auto", gap: 20, padding: "20px 16px", alignItems: "start" }}>

              {/* ── Venstre: Originalmail + analyse ── */}
              <div style={{ width: 340, flexShrink: 0 }}>
                {/* Originalmail */}
                <div style={{ background: "#FFF", border: "1px solid #E5E7EB", borderRadius: 14, padding: 18, marginBottom: 14 }}>
                  <div style={{ fontSize: 11, color: "#9CA3AF", fontWeight: 600, textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>Medlemmets mail</div>
                  <div style={{ fontSize: 13, color: "#374151", lineHeight: 1.6, whiteSpace: "pre-wrap", maxHeight: 180, overflowY: "auto" }}>
                    {mailTekst}
                  </div>
                </div>

                {/* AI-analyse */}
                <div style={{ background: "#FFF", border: "1px solid #E5E7EB", borderRadius: 14, padding: 18, marginBottom: 14 }}>
                  <div style={{ fontSize: 11, color: "#9CA3AF", fontWeight: 600, textTransform: "uppercase", letterSpacing: 1, marginBottom: 12 }}>Analyse</div>

                  {/* Navn */}
                  <div style={{ marginBottom: 14 }}>
                    <div style={{ fontSize: 11, color: "#6B7280", marginBottom: 4 }}>Detekteret navn</div>
                    <div style={{ fontSize: 15, fontWeight: 600, color: analyse.navn ? PP_GREEN : PP_ACCENT }}>
                      {analyse.navn || "Ikke fundet — husk at spørge!"}
                    </div>
                  </div>

                  {/* Situationer */}
                  <div style={{ marginBottom: 14 }}>
                    <div style={{ fontSize: 11, color: "#6B7280", marginBottom: 6 }}>Identificerede situationer</div>
                    <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                      {analyse.situationer.map((s) => {
                        const vb = VIDENSBASE[s];
                        return vb ? <AnalyseTag key={s} label={`${vb.icon} ${vb.label}`} color={vb.color} /> : null;
                      })}
                    </div>
                  </div>

                  {/* Spørgsmål */}
                  {analyse.spørgsmål.length > 0 && (
                    <div style={{ marginBottom: 14 }}>
                      <div style={{ fontSize: 11, color: "#6B7280", marginBottom: 6 }}>Konkrete spørgsmål at besvare</div>
                      {analyse.spørgsmål.map((sp, i) => (
                        <div key={i} style={{ display: "flex", gap: 8, alignItems: "start", marginBottom: 6 }}>
                          <span style={{ color: PP_ACCENT, fontWeight: 700, flexShrink: 0, fontSize: 12 }}>!</span>
                          <span style={{ fontSize: 12, color: "#374151", lineHeight: 1.4 }}>{sp}</span>
                        </div>
                      ))}
                    </div>
                  )}

                  {/* Tone */}
                  <div>
                    <div style={{ fontSize: 11, color: "#6B7280", marginBottom: 4 }}>Tone i mailen</div>
                    <AnalyseTag
                      label={analyse.tone === "bekymret" ? "😟 Bekymret" : analyse.tone === "akut" ? "🔴 Akut/presserende" : analyse.tone === "positiv" ? "😊 Positiv" : "📝 Neutral"}
                      color={analyse.tone === "bekymret" ? PP_WARN : analyse.tone === "akut" ? PP_ACCENT : analyse.tone === "positiv" ? PP_GREEN : "#6B7280"}
                    />
                  </div>
                </div>

                {/* Tips */}
                <div style={{ background: `${PP_WARN}08`, border: `1px solid ${PP_WARN}25`, borderRadius: 14, padding: 18 }}>
                  <div style={{ fontSize: 11, color: PP_WARN, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1, marginBottom: 10 }}>
                    💡 Tips til dit svar
                  </div>
                  {analyse.tips.map((tip, i) => (
                    <div key={i} style={{ display: "flex", gap: 8, alignItems: "start", marginBottom: 8 }}>
                      <span style={{ color: PP_WARN, fontWeight: 700, flexShrink: 0, fontSize: 11 }}>→</span>
                      <span style={{ fontSize: 12, color: "#4B5563", lineHeight: 1.5 }}>{tip}</span>
                    </div>
                  ))}
                </div>
              </div>

              {/* ── Højre: Svarforslag ── */}
              <div style={{ flex: 1, minWidth: 0 }}>
                {primærSituation && (
                  <>
                    {/* Svarforslag */}
                    <div style={{ background: "#FFF", border: "1px solid #E5E7EB", borderRadius: 14, padding: 22, marginBottom: 14 }}>
                      <h2 style={{ margin: "0 0 4px", fontSize: 18, color: PP_DARK, fontWeight: 600 }}>
                        Foreslået svar
                      </h2>
                      <p style={{ margin: "0 0 16px", fontSize: 14, color: "#6B7280", lineHeight: 1.5 }}>
                        "Hej {analyse.navn || "[navn]"} — {primærSituation.aabning.charAt(0).toLowerCase() + primærSituation.aabning.slice(1)}"
                      </p>
                      {primærSituation.svarblokke.map((blok, i) => (
                        <div
                          key={i}
                          style={{
                            padding: "12px 14px",
                            borderRadius: 10,
                            background: blok.vigtigt ? `${primærSituation.color}05` : "#FAFAFA",
                            borderLeft: `3px solid ${blok.vigtigt ? primærSituation.color : "#E5E7EB"}`,
                            marginBottom: 8,
                          }}
                        >
                          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                            <h4 style={{ margin: 0, fontSize: 13, color: PP_DARK, fontWeight: 600 }}>{blok.title}</h4>
                            {blok.vigtigt && (
                              <span style={{ fontSize: 9, background: `${primærSituation.color}15`, color: primærSituation.color, padding: "2px 7px", borderRadius: 8, fontWeight: 700 }}>VIGTIGT</span>
                            )}
                          </div>
                          <p style={{ margin: 0, fontSize: 13, color: "#4B5563", lineHeight: 1.6 }}>{blok.tekst}</p>
                        </div>
                      ))}
                    </div>

                    {/* Andre situationer */}
                    {analyse.situationer.length > 1 && (
                      <div style={{ background: "#FFF", border: "1px solid #E5E7EB", borderRadius: 14, padding: 22, marginBottom: 14 }}>
                        <h3 style={{ margin: "0 0 12px", fontSize: 14, color: "#6B7280", fontWeight: 600 }}>
                          Relaterede emner i mailen
                        </h3>
                        {analyse.situationer.slice(1).map((s) => {
                          const vb = VIDENSBASE[s];
                          if (!vb) return null;
                          return (
                            <div key={s} style={{ marginBottom: 12 }}>
                              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
                                <span>{vb.icon}</span>
                                <span style={{ fontWeight: 600, fontSize: 14, color: PP_DARK }}>{vb.label}</span>
                              </div>
                              {vb.svarblokke.filter((b) => b.vigtigt).map((blok, i) => (
                                <div key={i} style={{ padding: "10px 14px", background: "#FAFAFA", borderRadius: 8, borderLeft: `3px solid ${vb.color}`, marginBottom: 6 }}>
                                  <h4 style={{ margin: "0 0 2px", fontSize: 12, color: PP_DARK, fontWeight: 600 }}>{blok.title}</h4>
                                  <p style={{ margin: 0, fontSize: 12, color: "#4B5563", lineHeight: 1.5 }}>{blok.tekst}</p>
                                </div>
                              ))}
                            </div>
                          );
                        })}
                      </div>
                    )}

                    {/* Næste skridt */}
                    <div style={{ background: `${PP_GREEN}08`, border: `1px solid ${PP_GREEN}25`, borderRadius: 14, padding: "14px 18px", marginBottom: 14, display: "flex", alignItems: "center", gap: 12 }}>
                      <span style={{ fontSize: 18, flexShrink: 0 }}>✅</span>
                      <div>
                        <div style={{ fontSize: 10, color: PP_GREEN, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1, marginBottom: 2 }}>Afslut med et konkret næste skridt</div>
                        <p style={{ margin: 0, fontSize: 13, color: "#374151" }}>"{primærSituation.handling}"</p>
                      </div>
                    </div>

                    {/* Links */}
                    <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 14 }}>
                      {primærSituation.links.map((link, i) => (
                        <div key={i} style={{ padding: "6px 12px", background: "#FFF", border: "1px solid #E5E7EB", borderRadius: 8, fontSize: 11, color: PP_BLUE, fontWeight: 600 }}>
                          🔗 {link}
                        </div>
                      ))}
                    </div>

                    {/* ── Skriv dit svar + jargon-tjek ── */}
                    <div style={{ background: "#FFF", border: "1px solid #E5E7EB", borderRadius: 14, padding: 18, marginBottom: 14 }}>
                      <h4 style={{ margin: "0 0 10px", fontSize: 11, color: "#6B7280", fontWeight: 600, textTransform: "uppercase", letterSpacing: 1 }}>
                        ✍️ Skriv dit svar — og tjek det for jargon
                      </h4>
                      <textarea
                        value={svarTekst}
                        onChange={(e) => { setSvarTekst(e.target.value); setJargonFund([]); }}
                        placeholder={"Skriv eller indsæt dit svar til medlemmet her...\n\nDashboardet tjekker automatisk for pensionsjargon og foreslår klarere alternativer."}
                        style={{
                          width: "100%",
                          minHeight: 140,
                          padding: 14,
                          border: "1px solid #E5E7EB",
                          borderRadius: 10,
                          fontSize: 13,
                          lineHeight: 1.7,
                          fontFamily: "inherit",
                          resize: "vertical",
                          boxSizing: "border-box",
                          color: "#1F2937",
                          outline: "none",
                        }}
                      />
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 10 }}>
                        <span style={{ fontSize: 11, color: "#9CA3AF" }}>
                          {svarTekst.length > 0 ? `${svarTekst.length} tegn` : ""}
                        </span>
                        <button
                          onClick={handleTjekSvar}
                          disabled={!svarTekst.trim()}
                          style={{
                            padding: "8px 20px",
                            background: svarTekst.trim() ? PP_WARN : "#D1D5DB",
                            color: "#FFF",
                            border: "none",
                            borderRadius: 8,
                            fontSize: 13,
                            fontWeight: 600,
                            cursor: svarTekst.trim() ? "pointer" : "default",
                            fontFamily: "inherit",
                          }}
                        >
                          🔍 Tjek for jargon
                        </button>
                      </div>

                      {/* Jargon-resultater */}
                      {jargonFund.length > 0 && (
                        <div style={{ marginTop: 14, padding: 14, background: `${PP_ACCENT}06`, border: `1px solid ${PP_ACCENT}20`, borderRadius: 10 }}>
                          <div style={{ fontSize: 12, color: PP_ACCENT, fontWeight: 700, marginBottom: 10 }}>
                            ⚠️ {jargonFund.length} fagudtryk fundet — overvej at forklare eller erstatte:
                          </div>
                          {jargonFund.map((j, i) => (
                            <div key={i} style={{ display: "flex", gap: 10, alignItems: "start", marginBottom: 8, paddingBottom: 8, borderBottom: i < jargonFund.length - 1 ? "1px solid #F3E8E8" : "none" }}>
                              <span style={{
                                fontSize: 9,
                                padding: "2px 6px",
                                borderRadius: 6,
                                fontWeight: 700,
                                flexShrink: 0,
                                marginTop: 2,
                                background: j.alvorlighed === "høj" ? `${PP_ACCENT}15` : j.alvorlighed === "middel" ? `${PP_WARN}15` : "#F3F4F6",
                                color: j.alvorlighed === "høj" ? PP_ACCENT : j.alvorlighed === "middel" ? PP_WARN : "#6B7280",
                              }}>
                                {j.alvorlighed === "høj" ? "!!!" : j.alvorlighed === "middel" ? "!!" : "!"}
                              </span>
                              <div>
                                <span style={{ fontSize: 13, fontWeight: 600, color: PP_DARK }}>"{j.term}"</span>
                                <div style={{ fontSize: 12, color: "#4B5563", marginTop: 2 }}>
                                  → Skriv i stedet: <em>"{j.forklaring}"</em>
                                </div>
                              </div>
                            </div>
                          ))}
                        </div>
                      )}
                      {jargonFund.length === 0 && svarTekst.trim() && jargonFund !== null && svarTekst.length > 20 && (
                        <div style={{ marginTop: 14, padding: 12, background: `${PP_GREEN}08`, border: `1px solid ${PP_GREEN}20`, borderRadius: 10, fontSize: 13, color: PP_GREEN, fontWeight: 600 }}>
                          ✓ Ingen pensionsjargon fundet — godt arbejde!
                        </div>
                      )}
                    </div>

                    {/* Kvalitetstjek */}
                    <div style={{ background: "#FFF", border: "1px solid #E5E7EB", borderRadius: 14, padding: 18 }}>
                      <h4 style={{ margin: "0 0 10px", fontSize: 11, color: "#6B7280", fontWeight: 600, textTransform: "uppercase", letterSpacing: 1 }}>
                        ✓ Kvalitetstjek inden afsendelse
                      </h4>
                      {[
                        `Bruger du "${analyse.navn || "???"}" — ikke et andet navn fra CRM?`,
                        "Besvarer du det konkrete spørgsmål — med konkrete tal?",
                        "Er tonen varm og empatisk — ikke kun transaktionel?",
                        "Er sproget frit for jargon (eller er fagudtryk forklaret)?",
                        "Afslutter du med ét klart næste skridt?",
                        "Er formateringen ren (ingen blandet typografi fra copy-paste)?",
                      ].map((item, i) => (
                        <label key={i} style={{ display: "flex", gap: 10, alignItems: "start", marginBottom: 7, fontSize: 12, color: "#374151", cursor: "pointer" }}>
                          <input type="checkbox" checked={!!checkedItems[i]} onChange={() => toggleCheck(i)} style={{ marginTop: 2, accentColor: PP_GREEN }} />
                          <span style={{ textDecoration: checkedItems[i] ? "line-through" : "none", opacity: checkedItems[i] ? 0.5 : 1 }}>{item}</span>
                        </label>
                      ))}
                    </div>
                  </>
                )}
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(RaadgiverDashboardV2));
  </script>
</body>
</html>
